name: AdamsApple
options:
  bundleIdPrefix: com.adamhoffman
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_CFBundleDisplayName: "Adams Apple"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_NSCameraUsageDescription: "Take progress photos to track your fitness journey."
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Add progress photos from your photo library."
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: "7366Y2P5Z9"

targets:
  AdamsApple:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adamhoffman.adamsapple
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Sources/AdamsApple.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.adamhoffman.adamsapple
    dependencies:
      - target: AdamsAppleWidget

  AdamsAppleWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adamhoffman.adamsapple.widget
        APPLICATION_EXTENSION_API_ONLY: "YES"
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: "7366Y2P5Z9"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: Widget/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: Widget/AdamsAppleWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.adamhoffman.adamsapple
