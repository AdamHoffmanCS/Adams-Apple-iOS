name: AdamsApple
options:
  bundleIdPrefix: com.adamhoffman
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: "YES"
    INFOPLIST_KEY_CFBundleDisplayName: "Adams Apple"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    TARGETED_DEVICE_FAMILY: "1,2"
    # Set your Apple Developer team ID here (or pick it in Xcode → Signing & Capabilities)
    DEVELOPMENT_TEAM: ""
targets:
  AdamsApple:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adamhoffman.adamsapple
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
